# SonarQube Cloud automatic analysis ignores sonar-project.properties.
# Keep the automatic Quality Gate focused on runtime framework code. Tests,
# workflow hardening, dependency auditing, and package metadata already have
# dedicated gates: PHPUnit, Psalm, PHPStan, Composer Audit, zizmor, and OpenSSF
# Scorecard.
sonar.sources=src
sonar.sourceEncoding=UTF-8
