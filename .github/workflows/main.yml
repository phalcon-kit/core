name: Phalcon Kit CI

on:
  schedule:
    - cron: '0 2 * * *' # Daily at 02:00 runs only on default branch
  push:
    paths-ignore:
      - '**.md'
      - '**.txt'
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PHALCON_VERSION: 5.17.0
  PHALCON_PECL_URL: https://github.com/phalcon/cphalcon/releases/download/v5.17.0/phalcon-pecl.tgz
  # PHP extensions required by Composer
  EXTENSIONS: apcu, gettext, gd, igbinary, imagick, intl, json, mbstring, msgpack, memcached, sqlite3, yaml, redis, openssl, swoole, :memcache, :psr
  EXTENSIONS_CACHE_KEY: php-ext-v4-php8.5-phalcon-helper-5.17.0

permissions:
  contents: read

jobs:
  # COMPOSER METADATA / SECURITY
  composer:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php:
          - "8.5"
        dependencies:
          - "highest"

    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Setup cache environment
        id: extcache
        uses: shivammathur/cache-extensions@v1
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.EXTENSIONS }}
          key: ${{ env.EXTENSIONS_CACHE_KEY }}

      - name: Cache PHP extensions
        uses: actions/cache@v5
        with:
          path: ${{ steps.extcache.outputs.dir }}
          key: ${{ steps.extcache.outputs.key }}
          restore-keys: ${{ steps.extcache.outputs.key }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.EXTENSIONS }}
          tools: composer

      - name: Ensure Phalcon 5.17.0
        run: bash .github/scripts/install-phalcon.sh

      - uses: ramsey/composer-install@v4
        with:
          dependency-versions: ${{ matrix.dependencies }}
          custom-cache-suffix: phalcon-kit-composer

      - name: Composer Validate
        run: composer validate --strict --no-check-publish

      - name: Composer Audit
        run: composer audit

  # PHP CODE SNIFFER
  code-sniffer:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        php:
          - "8.5"
        dependencies:
          - "highest"

    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Setup cache environment
        id: extcache
        uses: shivammathur/cache-extensions@v1
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.EXTENSIONS }}
          key: ${{ env.EXTENSIONS_CACHE_KEY }}

      - name: Cache PHP extensions
        uses: actions/cache@v5
        with:
          path: ${{ steps.extcache.outputs.dir }}
          key: ${{ steps.extcache.outputs.key }}
          restore-keys: ${{ steps.extcache.outputs.key }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.EXTENSIONS }}
          tools: composer, phpcs

      - name: Ensure Phalcon 5.17.0
        run: bash .github/scripts/install-phalcon.sh

      - uses: ramsey/composer-install@v4
        with:
          dependency-versions: ${{ matrix.dependencies }}
          custom-cache-suffix: phalcon-kit-composer

      - name: PHP Code Sniffer
        run: composer phpcs -- --report=summary

  # PHP STATIC ANALYSIS
  static-analysis:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        php:
          - "8.5"
        dependencies:
          - "highest"

    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Setup cache environment
        id: extcache
        uses: shivammathur/cache-extensions@v1
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.EXTENSIONS }}
          key: ${{ env.EXTENSIONS_CACHE_KEY }}

      - name: Cache PHP extensions
        uses: actions/cache@v5
        with:
          path: ${{ steps.extcache.outputs.dir }}
          key: ${{ steps.extcache.outputs.key }}
          restore-keys: ${{ steps.extcache.outputs.key }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.EXTENSIONS }}
          tools: composer, phpstan

      - name: Ensure Phalcon 5.17.0
        run: bash .github/scripts/install-phalcon.sh

      - uses: ramsey/composer-install@v4
        with:
          dependency-versions: ${{ matrix.dependencies }}
          custom-cache-suffix: phalcon-kit-composer

      - name: PHPStan
        run: PHPSTAN_DEBUG=0 composer phpstan -- --no-progress --error-format=github
  
  # PHP PSALM / SECURITY
  php-security:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    
    strategy:
      matrix:
        php:
          - "8.5"
        dependencies:
          - "highest"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Setup cache environment
        id: extcache
        uses: shivammathur/cache-extensions@v1
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.EXTENSIONS }}
          key: ${{ env.EXTENSIONS_CACHE_KEY }}

      - name: Cache PHP extensions
        uses: actions/cache@v5
        with:
          path: ${{ steps.extcache.outputs.dir }}
          key: ${{ steps.extcache.outputs.key }}
          restore-keys: ${{ steps.extcache.outputs.key }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.EXTENSIONS }}
          tools: composer, psalm

      - name: Ensure Phalcon 5.17.0
        run: bash .github/scripts/install-phalcon.sh

      - uses: ramsey/composer-install@v4
        with:
          dependency-versions: ${{ matrix.dependencies }}
          custom-cache-suffix: phalcon-kit-composer

      - name: Dump Composer autoloader
        run: composer dump-autoload -a

      - name: Clear Psalm Cache
        run: rm -rf ~/.cache/psalm results.sarif .psalm.cache

      - name: Run Psalm
        id: psalm
        continue-on-error: true
        run: |
          PSALM_THREADS=4 PSALM_SCAN_THREADS=4 composer psalm -- --output-format=github --report=results.sarif --report-show-info=false --no-progress --no-cache

      - name: Upload Psalm report to GitHub Code Scanning
        if: ${{ always() && hashFiles('results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4.36.2
        with:
          sarif_file: results.sarif
          category: psalm

      - name: Fail on Psalm errors
        if: ${{ steps.psalm.outcome == 'failure' }}
        run: exit 1

      - name: Run Psalm taint analysis
        run: |
          PSALM_THREADS=4 PSALM_SCAN_THREADS=4 composer psalm:taint -- --output-format=github --no-progress --no-cache

  # PHP UNIT TEST
  unit-tests:
    strategy:
      matrix:
        php:
          - "8.5"
        dependencies:
          - "highest"

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: phalcon_kit
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:8.0
        ports:
          - 6379:6379

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Prepare Locale
        run: |
          sudo locale-gen en_IN.UTF-8
          sudo update-locale LANG=en_IN.UTF-8
          sudo locale-gen en_CA.UTF-8
          sudo update-locale LANG=en_CA.UTF-8
          sudo locale-gen fr_CA.UTF-8
          sudo update-locale LANG=fr_CA.UTF-8

      - name: Setup cache environment
        id: extcache
        uses: shivammathur/cache-extensions@v1
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.EXTENSIONS }}
          key: ${{ env.EXTENSIONS_CACHE_KEY }}

      - name: Cache PHP extensions
        uses: actions/cache@v5
        with:
          path: ${{ steps.extcache.outputs.dir }}
          key: ${{ steps.extcache.outputs.key }}
          restore-keys: ${{ steps.extcache.outputs.key }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.EXTENSIONS }}
          tools: composer, phpunit

      - name: Ensure Phalcon 5.17.0
        run: bash .github/scripts/install-phalcon.sh

      - uses: ramsey/composer-install@v4
        with:
          dependency-versions: ${{ matrix.dependencies }}
          custom-cache-suffix: phalcon-kit-composer

      - name: Install Phalcon DevTools
        run: |
          composer global config minimum-stability dev
          composer global config prefer-stable true
          composer global require phalcon/devtools:^5.0 --no-interaction --no-progress
          echo "$(composer global config home)/vendor/bin" >> $GITHUB_PATH

      - name: Set permissions and environment
        run: |
          chmod +x ./bin/* ./vendor/bin/* ./phalcon-kit
          mkdir -p .phalcon
          touch .env
          cp .env.github .env

      - name: Run migrations
        run: |
          ./bin/migration-list.sh
          ./bin/migration-run.sh

      - name: PHP Unit
        run: composer phpunit -- --display-skipped --display-errors
        
