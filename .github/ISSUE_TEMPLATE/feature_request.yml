name: Feature request
description: Propose a focused improvement or new capability.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What real application or maintainer problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, behavior, scaffolding output, or configuration shape you propose.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention workarounds or existing Phalcon/Phalcon Kit behavior.
    validations:
      required: false
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility impact
      description: Note BC breaks, migrations, performance impact, or documentation changes.
    validations:
      required: true
