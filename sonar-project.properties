sonar.projectKey=phalcon-kit_core
sonar.organization=phalcon-kit
sonar.sourceEncoding=UTF-8

# Keep the SonarQube Cloud Quality Gate focused on runtime framework code.
# Tests, workflow hardening, dependency auditing, and package metadata already
# have dedicated gates: PHPUnit, Psalm, PHPStan, Composer Audit, zizmor, and
# OpenSSF Scorecard. Treating those files as production source creates noisy
# reliability/security failures, such as test-only invalid-constructor cases or
# review-only GitHub Actions pinning hotspots.
sonar.sources=src
